name: 🎭 Integration tests
on:
  workflow_call:
  workflow_dispatch:
env:
  CI: "true"
  FORCE_COLOR: true

jobs:
  test:
    name: 🎭 Integration tests (${{ matrix.db-backend }})
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        db-backend: [sqlite, inmemory, postgres]
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v6

      - name: ⚒️ Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: tests/package-lock.json
          node-version-file: tests/package.json

      - name: ⚒️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 📥 Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: 🐋 Load Docker image
        run: gunzip < /tmp/mechanus.tar.gz | docker load

      - name: ⚒️ Install dependencies
        working-directory: tests
        run: npm ci

      - name: 🐋 Start server
        working-directory: tests
        env:
          DB_BACKEND: ${{ matrix.db-backend }}
        run: |
          make server

      - name: 🎭 Run Playwright tests
        working-directory: tests
        run: |
          npm run test

      - name: ✒️ export server logs
        if: ${{ !cancelled() }}
        working-directory: tests
        env:
          DB_BACKEND: ${{ matrix.db-backend }}
        run: |
          make server-logs

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.db-backend }}
          path: tests/playwright-report/
          retention-days: 5
